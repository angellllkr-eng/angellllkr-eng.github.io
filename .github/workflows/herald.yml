name: Herald - Events
on:
  workflow_dispatch:
  issues:
    types: [opened, labeled]
jobs:
  herald:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log event
        run: |
          mkdir -p events
          echo "Event logged: $(date) " > events/event-$(date -u +%Y-%m-%d-%H%M).md
      - name: Commit
        run: |
          git config user.name "MRPPRODUCTION-Herald"
          git config user.email "actions@github.com"
          git add events/ || true
          git diff --quiet && git diff --cached --quiet || git commit -m "Herald: Event $(date -u +%Y-%m-%d)"
          git push || true